<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Rotation Integrated Project</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI", Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#f5f7fa,#e9eef5);
    padding:40px;
}

.header{
    text-align:center;
    margin-bottom:40px;
}

.logo{
    width:240px;
    margin-bottom:20px;
}

h1{
    color:#0056A6;
    font-size:48px;
}

h2{
    color:#38C2A0;
    font-size:34px;
    margin-top:5px;
}

.subtitle{
    color:#666;
    margin-top:12px;
}

.departments{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:20px;
    max-width:1100px;
    margin:0 auto 35px auto;
}

.card{
    background:white;
    padding:25px;
    border-radius:16px;
    text-align:center;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-bottom:5px solid #38C2A0;
}

.card h3{
    color:#0056A6;
    font-size:28px;
    margin-bottom:8px;
}

.card p{
    color:#38C2A0;
    font-weight:600;
}

.info-box{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:18px;
    box-shadow:0 5px 18px rgba(0,0,0,0.08);
    border-left:6px solid #0056A6;
}

.info-box h3{
    color:#0056A6;
    font-size:28px;
    margin-bottom:12px;
}

.info-box p{
    color:#444;
    font-size:18px;
    line-height:1.7;
}

.green{
    color:#38C2A0;
    font-weight:700;
}
</style>
</head>

<body>

<div class="header">
    <img src="qatarenergy-logo.png" alt="QatarEnergy Logo" class="logo">

    <h1>IT Rotation</h1>
    <h2>Integrated Project</h2>

    <p class="subtitle">
        QatarEnergy Information Technology Department
    </p>
</div>

<div class="departments">

    <div class="card" onclick="showDepartment('ITG')">
        <h3>ITG</h3>
        <p>Governance</p>
    </div>

    <div class="card" onclick="showDepartment('ITO')">
        <h3>ITO</h3>
        <p>Operations</p>
    </div>

    <div class="card" onclick="showDepartment('ITS')">
        <h3>ITS</h3>
        <p>Business Support</p>
    </div>

    <div class="card" onclick="showDepartment('ITP')">
        <h3>ITP</h3>
        <p>Information Security</p>
    </div>

    <div class="card" onclick="showDepartment('ITD')">
        <h3>ITD</h3>
        <p>Digital CoE</p>
    </div>

</div>

<div class="info-box">
    <h3 id="title">Welcome</h3>
    <p id="content">
        Click on any <span class="green">IT department</span> to explore the rotation journey and key learning areas.
    </p>
</div>

<script>
function showDepartment(dept){

    const departments = {

        ITG: {
            title: "ITG - IT Governance",
            content: "IT Governance focuses on aligning IT activities with business objectives through governance, PMO, enterprise architecture, transformation management, risk management, and strategic planning."
        },

        ITO: {
            title: "ITO - IT Operations",
            content: "IT Operations focuses on client services and ICT infrastructure. It supports daily IT services, end-user devices, networks, servers, and operational stability."
        },

        ITS: {
            title: "ITS - Business Support",
            content: "Business Support manages enterprise applications such as SAP and other business-critical systems that support QatarEnergy’s internal operations."
        },

        ITP: {
            title: "ITP - Information Security",
            content: "Information Security focuses on cybersecurity operations, risk assessment, compliance, security monitoring, incident response, and cyber awareness."
        },

        ITD: {
            title: "ITD - Digital Center of Excellence",
            content: "Digital CoE focuses on emerging technologies, cloud, artificial intelligence, automation, data management, and digital innovation initiatives."
        }

    };

    document.getElementById("title").innerHTML = departments[dept].title;
    document.getElementById("content").innerHTML = departments[dept].content;
}
</script>

</body>
</html>
